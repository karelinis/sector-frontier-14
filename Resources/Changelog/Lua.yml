- author: nenado45
  changes:
    - type: Add
      message: >-
        Добавлен скафандр ботаника. В нем можно ходить сквозь кудзу и спокойно
        брать смертокрапиву даже без перчаток. Изучается в нио за 10к очков.
    - type: Add
      message: >-
        Добавлены два новых растения мята и огненное алоэ. Первое это мутация
        чайного куста, в ней находится криоксадон. А вот огненное алое, как
        понятно из названия, мутация обычного алоэ. Оно содержит в себе пиразин
        и лепоразин. При держании ее в руках наносится пассивный урон, который
        проходит сквозь броню за 10 секунд держания вы упадете в крит. При ударе
        она наносит 5 термо урона и сильно поджигает если ударить ей 3 раза, то
        она полностью сломается.
    - type: Add
      message: В медфабе можно сделать коробки для палочек.
    - type: Add
      message: >-
        В чайных листьях теперь новый реагент - зелёный чайный порошок. Из него
        можно создать зелёный чай, смешав с водой.
    - type: Fix
      message: Траумоксадон и стеллоксадон НЕ с заглавной буквы.
    - type: Add
      message: >-
        В сумку медиков (которая на пояс большая) можно ложить мешки для тел и
        компактные дефибы.
    - type: Add
      message: >-
        Также у чайного куста есть еще одна мутация - можжевельник. В нем
        содержится салициновая кислота...
    - type: Add
      message: >-
