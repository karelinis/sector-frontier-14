- type: entity
  id: ADTDesktopTableCaptain
  parent: BaseItem
  name: desk plaque "Captain"
  description: I'M THE BOSS!
  components:
  - type: Sprite
    sprite: _ADT/Objects/Misc/desktop_table.rsi
