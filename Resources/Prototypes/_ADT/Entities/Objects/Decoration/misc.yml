- type: entity
  id: ADTServingCart
  parent: BaseStructure
  name: serving cart
  description: Needed to conveniently bring drinks, large dishes and many drinks!
  components:
  - type: Sprite
    sprite: _ADT/Objects/Misc/serving_cart.rsi
    state: cart
  - type: Item
    size: Large
  - type: Storage
    maxItemSize: Normal
    grid:
    - 0,0,6,3
  - type: ContainerContainer
    containers:
      storagebase: !type:Container
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeAabb
          bounds: "-0.4,-0.4,0.4,0.4"
        density: 60
        mask:
        - MachineMask
        layer:
        - MidImpassable
        - LowImpassable
  - type: Damageable
    damageContainer: StructuralInorganic
    damageModifierSet: Metallic
  - type: Destructible
    thresholds:
      - trigger:
          !type:DamageTrigger
          damage: 100
        behaviors:
        - !type:DoActsBehavior
          acts: [ "Destruction" ]
