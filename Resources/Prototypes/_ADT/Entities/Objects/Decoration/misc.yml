- type: entity
  id: ADTShipBottle
  parent: BaseItem
  name: ship in a bottle
  description: The riddle of the century - how can you fit a ship in a bottle?
  components:
  - type: Sprite
    sprite: _ADT/Objects/Misc/ship_bottle.rsi
    state: ship_bottle
  - type: Item
    size: Small
  - type: Anchorable
  - type: Damageable
    damageContainer: Inorganic
    damageModifierSet: Glass
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 5
      behaviors:
      - !type:PlaySoundBehavior
        sound:
          collection: GlassBreak
      - !type:SpawnEntitiesBehavior
        spawn:
          MaterialWoodPlank1:
            min: 1
            max: 1
          ShardGlass:
            min: 2
            max: 2
      - !type:DoActsBehavior
        acts: [ "Destruction" ]

- type: entity
