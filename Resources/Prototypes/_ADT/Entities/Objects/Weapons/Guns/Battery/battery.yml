- type: entity
  name: CC-7 "Arbiter"
  parent: [ BaseWeaponBattery ]
  id: ADTWeaponBlasterCC7Arbiter
  description: Arbiter
  components:
  - type: Sprite
    sprite: _ADT/Objects/Weapons/Guns/Battery/cc-7_arbiter.rsi
    layers:
      - state: base
        map: ["enum.GunVisualLayers.Base"]
      - state: mag-unshaded-0
        map: ["enum.GunVisualLayers.MagUnshaded"]
        shader: unshaded
  - type: Gun
    fireRate: 2
    soundGunshot:
      path: /Audio/Weapons/Guns/Gunshots/laser_cannon.ogg
  - type: ProjectileBatteryAmmoProvider
    proto: ADTBulletYellowLaser
    fireCost: 125
  - type: BatteryWeaponFireModes
    fireModes:
    - proto: ADTBulletYellowLaser
      fireCost: 125
    - proto: ADTBulletDisabler
      fireCost: 156
  - type: MagazineVisuals
    magState: mag
    steps: 13
    zeroVisible: true
  - type: Clothing
    sprite: _ADT/Objects/Weapons/Guns/Battery/cc-7_arbiter.rsi
    quickEquip: false
    slots:
    - suitStorage
    - Belt
  - type: Item
    size: Small
    shape:
    - 0,0,1,0
    - 0,1,0,1
  - type: Battery
    maxCharge: 1625
    startingCharge: 1625
