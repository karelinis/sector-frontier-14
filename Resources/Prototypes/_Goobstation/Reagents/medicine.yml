- type: reagent
  id: PentenicAcid
  name: reagent-name-pentenic-acid
  group: Medicine
  desc: reagent-desc-pentenic-acid
  physicalDesc: reagent-physical-desc-acidic
  flavor: medicine
  color: "#22ff1a"
  plantMetabolism:
    - !type:PlantAdjustWeeds
      amount: -4
    - !type:PlantAdjustToxins
      amount: -8
  metabolisms:
    Medicine:
      metabolismRate: 0.5
      effects:
      - !type:ChemCleanBloodstream
      - !type:HealthChange
        damage:
          types:
            Poison: -1
            Radiation: -0.5 # grants 100% protection from rads until higher rad values
      - !type:GenericStatusEffect
        key: RadiationProtection
        component: RadiationProtection
        time: 2
        type: Add
        refresh: false

- type: reagent
  id: Antihol # Charcoal hog more than anything
  name: reagent-name-antihol
  group: Medicine
  desc: reagent-desc-antihol
  physicalDesc: reagent-physical-desc-syrupy
  flavor: medicine
  color: "#40ffec"
  plantMetabolism:
    - !type:PlantAdjustToxins
      amount: -2
    - !type:PlantAdjustWeeds
      amount: -5
    - !type:PlantAdjustHealth
      amount: -10
  metabolisms:
    Medicine:
      effects:
      - !type:HealthChange
        conditions:
        - !type:TotalDamage
          min: 50
        damage:
          types:
            Poison: -1
      - !type:AdjustReagent
        reagent: Ethanol
        amount: -4

- type: reagent
  id: SilverSulfadiazine
  name: reagent-name-silver-sulfadiazine
  group: Medicine
  desc: reagent-desc-silver-sulfadiazine
  physicalDesc: reagent-physical-desc-viscous
  flavor: bitter
  color: "#ffed24"
  plantMetabolism:
    - !type:PlantAdjustWeeds
      amount: -8
    - !type:PlantAdjustHealth
      amount: -20
  worksOnTheDead: true
  reactiveEffects:
    Acidic:
      methods: [ Touch ]
      effects:
      - !type:HealthChange
        scaleByQuantity: true
        ignoreResistances: false
        damage:
          types:
            Heat: -1
            Cold: -1
            Shock: -1
            Caustic: -1
  metabolisms:
    Medicine:
      metabolismRate: 3
      effects:
      - !type:HealthChange
        damage:
          types:
            Heat: -1
            Cold: -1
      - !type:HealthChange
        damage:
          types:
            Poison: 2

