#region ящик поставки ИИ-КСО
- type: entity
  id: AIFSFCrate
  parent: CrateBaseSecure
  name: ящик подкреплений клонов КСО
  description: Ящик снаряжения, поставляемый в сектора Фронтира. Содержит оборудование, выданно ЦК
  components:
  - type: Icon
    sprite: Structures/Storage/Crates/command.rsi
  - type: Sprite
    sprite: Structures/Storage/Crates/command.rsi
  - type: EntityTableContainerFill
    containers:
      entity_storage: !type:AllSelector
        children:
        - id: AITeleportDocumentFSF
          amount: !type:ConstantNumberSelector
            value: 1
        - id: AiTeleportFSF
          amount: !type:ConstantNumberSelector
            value: 1

#region документ ИИ-КСО
- type: entity
  parent: PaperPrintedCentcomm
  id: AITeleportDocumentFSF
  name: Руководство пользователя Телепорта Подкреплений КСО
  description: Официальный документ, поясняющий принцип работы телепорта подкреплений КСО и поставляемых клонов. Выдан Центральным Коммандованием.
  categories: [ HideSpawnMenu ]
  components:
  - type: Paper
    content: |
      [head=3]Центральное Командование[/head]
      [head=3]ЦК[/head]
      ═════════════════════════════════════
      [bold]Руководство пользователя Телепорта Подкреплений КСО[/bold]
      ═════════════════════════════════════
      Составитель документа: Адриан Кроуфорд
      Должность составителя: Администратор Центрального Командования
      Номер документа: ЦК-253478-ESF-09
      Дата написания: 15.12.2708
      Срок действия: бессрочно, до отзыва документа

      [head=2]1. Введение[/head]
      Данный документ предназначен для ознакомления с принципом работы Телепорта Подкреплений КСО, а также с характеристиками и способностями клонов, которые он может доставить на поле боя. Телепорт Подкреплений КСО является незаменимым инструментом для обеспечения оперативной поддержки бойцов НТ в условиях интенсивных боевых действий.

      Данный телепорт отправляет на поле боя полностью укомплектованный отряд, состоящий из маяка, бойца-командира, бойца с дробовиком, двух бойцов с импульсным лазером и двух медиков. Все клоны, доставляемые телепортом, являются клонами второго класса, что означает, что они могут быть менее эффективными в бою по сравнению с высококачественными клонами, но при этом они обеспечивают необходимую численную поддержку.

      Центральное командование рекомендует воздержаться от попыток снять запечатанный скафандр с клона, так как это может привести к его повреждению и снижению боеспособности. Клоны, доставляемые телепортом, предназначены для непосредственного участия в боевых действиях и не предназначены для длительного использования вне поля боя.

      После использования телепорта, клоны будут автоматически отозванны с поля боя по прошествию одного часа, что гарантирует, что они не будут оставаться на месте слишком долго и не будут создавать дополнительные риски захвата данной технологии противником.

      [head=2]2. Принцип действия телепорта и отряды[/head]
      Телепорт Подкреплений КСО работает на основе передовой технологии, которая позволяет мгновенно перемещать объекты на большие расстояния. Телепорт обладает независимой самозаряжающейся батареей, полного заряда которой хватит на вызов трёх отрядов. Скорость самовосполнения заряда - 1 отряд каждые 20 минут. Производительность телепорта - 3 отряда в час единоразово. При активации телепорта, он создает энергетический портал, через который отряд клонов может быть доставлен непосредственно на поле боя или в зону подготовки. Этот процесс занимает всего несколько мгновений, что обеспечивает оперативную поддержку в критических ситуациях.

      Каждый клон ещё на этапе разморозки автоматически привязывается к своему маяку отряда, что позволяет держателю маяка контроллировать местоположение клонов. Клоны, доставляемые телепортом, обладают базовыми боевыми навыками и снаряжением, что позволяет им эффективно выполнять свои задачи на поле боя. Боец-командир обладает улучшенными тактическими навыками и может координировать действия отряда, в то время как бойцы с дробовиком и импульсным лазером обеспечивают огневую поддержку. Медики же отвечают за лечение и поддержку здоровья отряда в бою.

      [head=2]3. Описание бойцов и их способностей[/head]
      Все бойцы являются запаянными в скафандры клонами, что обеспечивает им необходимую защиту от внешней среды. Данным клонам установлен имплант-растворитель для их необратимого повреждения после смерти, что гарантирует, что технология клонирования не будет захвачена противником. Поставляемые клоны не требуют обслуживания и полностью автономны, что позволяет им эффективно выполнять свои задачи на поле боя без необходимости дополнительной поддержки.
    
      Все клоны следуют за своим маяком и остаются около него, обеспечивая охрану периметра вокруг своего маяка.
    
      [head=3]Боец-командир: [/head] Этот клон обладает улучшенными тактическими навыками и может координировать действия отряда. Он оснащён улучшенным оружием и бронёй, что позволяет ему эффективно выполнять свои задачи на поле боя. Также данный клон обучен стрельбе из подствольного гранатомёта оглушающими гранатами, и может использовать их для контроля над противниками и создания тактических преимуществ.
    
      [head=3]Боец с дробовиком: [/head]Эти клоны являются наиболее активными бойцами отряда и оснащены дробовиками, что позволяет им эффективно бороться с противниками на ближней дистанции. Они обладают базовыми боевыми навыками и могут использовать свою огневую мощь для подавления врагов и защиты своих товарищей. Также они обучены прыжку в стороны от врагов, что позволяет им избегать вражеского огня и создавать тактические преимущества в бою.
    
      [head=3]Бойцы с импульсным лазером: [/head]Эти клоны оснащены импульсными лазерами, что позволяет им эффективно бороться с противниками на средней дистанции. Они обладают базовыми боевыми навыками и могут использовать свою огневую мощь для подавления врагов и защиты своих товарищей.
    
      [head=3]Медики: [/head]Эти клоны отвечают за лечение и поддержку здоровья отряда в бою. Они оснащены миниатюрными телепортерами медицинских дронов, что позволяет им эффективно лечить раны и поддерживать здоровье своих товарищей. Медики также оснащены комплектом ядовитых дротиков и арбалетами для отравления противника на поле боя, что позволяет им создавать тактические преимущества и защищать своих товарищей от врагов.

        [head=2]4. Заключение[/head]
      Телепорт Подкреплений КСО является важным инструментом для обеспечения оперативной поддержки бойцов СРБС в условиях интенсивных боевых действий. Он позволяет доставлять на поле боя отряды клонов, которые могут эффективно выполнять свои задачи и поддерживать своих товарищей в бою. Центральное командование рекомендует использовать данный телепорт с осторожностью и в соответствии с инструкциями, чтобы обеспечить максимальную эффективность и безопасность при его использовании.

      ═════════════════════════════════════
      [italic]Место для печатей[/italic]
    stampState: paper_stamp-centcom
    stampedBy: 
      - stampedName: "Центком"
        stampedColor: "#006600FF"
    editingDisabled: true

