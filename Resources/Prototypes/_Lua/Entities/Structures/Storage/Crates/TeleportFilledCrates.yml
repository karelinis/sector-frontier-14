#       После использования телепорта, клоны будут автоматически отозванны с поля боя по прошествию одного часа, что гарантирует, что они не будут оставаться на месте слишком долго и не будут создавать дополнительные риски захвата данной технологии противником.

#       [head=2]2. Принцип действия телепорта и отряды[/head]
#       Телепорт Подкреплений ЯО работает на основе передовой технологии, которая позволяет мгновенно перемещать объекты на большие расстояния. Телепорт обладает независимой самозаряжающейся батареей, полного заряда которой хватит на вызов трёх отрядов. Скорость самовосполнения заряда - 1 отряд каждые 20 минут. Производительность телепорта - 3 отряда в час единоразово. При активации телепорта, он создает энергетический портал, через который отряд клонов может быть доставлен непосредственно на поле боя или в зону подготовки. Этот процесс занимает всего несколько мгновений, что обеспечивает оперативную поддержку в критических ситуациях.

#       Каждый клон ещё на этапе разморозки автоматически привязывается к своему маяку отряда, что позволяет держателю маяка контроллировать местоположение клонов. Клоны, доставляемые телепортом, обладают базовыми боевыми навыками и снаряжением, что позволяет им эффективно выполнять свои задачи на поле боя. Боец-командир обладает улучшенными тактическими навыками и может координировать действия отряда, в то время как бойцы с дробовиком и импульсным лазером обеспечивают огневую поддержку. Медики же отвечают за лечение и поддержку здоровья отряда в бою.

#       [head=2]3. Описание бойцов и их способностей[/head]
#       Все бойцы являются запаянными в скафандры клонами, что обеспечивает им необходимую защиту от внешней среды. Данным клонам установлен имплант-растворитель для их необратимого повреждения после смерти, что гарантирует, что технология клонирования не будет захвачена противником. Поставляемые клоны не требуют обслуживания и полностью автономны, что позволяет им эффективно выполнять свои задачи на поле боя без необходимости дополнительной поддержки.
    
#       Все клоны следуют за своим маяком и остаются около него, обеспечивая охрану периметра вокруг своего маяка.
    
#       [head=3]Боец-командир: [/head] Этот клон обладает улучшенными тактическими навыками и может координировать действия отряда. Он оснащён улучшенным оружием и бронёй, что позволяет ему эффективно выполнять свои задачи на поле боя. Также данный клон обучен стрельбе из подствольного гранатомёта оглушающими гранатами, и может использовать их для контроля над противниками и создания тактических преимуществ.
    
#       [head=3]Боец с дробовиком: [/head]Эти клоны являются наиболее активными бойцами отряда и оснащены дробовиками, что позволяет им эффективно бороться с противниками на ближней дистанции. Они обладают базовыми боевыми навыками и могут использовать свою огневую мощь для подавления врагов и защиты своих товарищей. Также они обучены прыжку в стороны от врагов, что позволяет им избегать вражеского огня и создавать тактические преимущества в бою.
    
#       [head=3]Бойцы с импульсным лазером: [/head]Эти клоны оснащены импульсными лазерами, что позволяет им эффективно бороться с противниками на средней дистанции. Они обладают базовыми боевыми навыками и могут использовать свою огневую мощь для подавления врагов и защиты своих товарищей.
    
#       [head=3]Медики: [/head]Эти клоны отвечают за лечение и поддержку здоровья отряда в бою. Они оснащены миниатюрными телепортерами медицинских дронов, что позволяет им эффективно лечить раны и поддерживать здоровье своих товарищей. Медики также оснащены комплектом ядовитых дротиков и арбалетами для отравления противника на поле боя, что позволяет им создавать тактические преимущества и защищать своих товарищей от врагов.

#         [head=2]4. Заключение[/head]
#       Телепорт Подкреплений ЯО является важным инструментом для обеспечения оперативной поддержки бойцов Синдиката в условиях интенсивных боевых действий. Он позволяет доставлять на поле боя отряды клонов, которые могут эффективно выполнять свои задачи и поддерживать своих товарищей в бою. Высшее Руководство Синдиката рекомендует использовать данный телепорт с осторожностью и в соответствии с инструкциями, чтобы обеспечить максимальную эффективность и безопасность при его использовании.

