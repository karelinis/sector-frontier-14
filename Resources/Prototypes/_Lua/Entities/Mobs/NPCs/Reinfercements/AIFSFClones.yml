#region базы

- type: htnCompound
  id: AIFSFCompound
  branches:
    - tasks:
        - !type:HTNCompoundTask
          task: InnateRangedCombatCompound
    - tasks:
        - !type:HTNCompoundTask
          task: MeleeCombatCompound
    - tasks:
        - !type:HTNCompoundTask
          task: FollowCompound
    - tasks:
        - !type:HTNCompoundTask
          task: IdleCompound

- type: entity
  id: AIFSFMovementSpeedModifierRanged
  abstract: true
  components:
  - type: MovementSpeedModifier
    baseWalkSpeed : 8
    baseSprintSpeed : 8
  - type: FootstepModifier
    footstepSoundCollection:
      collection: FootstepSoldier
      params:
        volume: -3

- type: entity
  id: FSFBaseLoadout
  abstract: true
  components:
  - type: Sprite
    drawdepth: Mobs
    layers:
    # Body
    - sprite: _NF/Mobs/Species/Templates/human.rsi
      state: human
    # Suit
    - sprite: _Lua/Clothing/OuterClothing/Hardsuits/FSFSuits/fsf_bravo_specialist_hardsuit.rsi
      state: equipped-OUTERCLOTHING
    # Gas tank
    - sprite: _NF/Objects/Tanks/o2n2equal.rsi
      state: equipped-SUITSTORAGE
    # Helmet
    - sprite: _Lua/Clothing/OuterClothing/Hardsuits/FSFSuits/fsf_bravo_specialist_helmet.rsi
      state: on-equipped-HELMET
    # IFF
    - sprite: _NF/Clothing/Neck/Misc/mercenary_iff.rsi
      state: equipped-NECK-off
    - sprite: _NF/Clothing/Neck/Misc/mercenary_iff.rsi
      state: equipped-NECK-on
      color: "#00e1ff"
      shader: unshaded
  - type: PointLight
    color: "#b9fffc"
    enabled: true
    radius: 6
    energy: 4
    mask: /Textures/Effects/LightMasks/cone.png
    autoRot: true
    netsync: false

#костыль для того что бы их было видно в термалах
- type: body
  id: AIFSFBody
  name: AIFSFBody
  root: torso
  slots:
    torso:
      part: TorsoAnimal
      connections:
      - legs
    legs:
      part: LegsAnimal
      connections:
      - feet
    feet:
      part: FeetAnimal

#region база мобов
- type: entity
  abstract: true
  parent:
  - AIClonesBase
  - AIFSFMovementSpeedModifierRanged
  id: AIFSFMobBase
  components:
  - type: Body
    prototype: AIFSFBody
    requiredLegs: 1
    thermalVisibility: true
  - type: NpcFactionMember
    factions:
    - NanoTrasen
  - type: NPCImprintingOnSpawnBehaviour
    whitelist:
      tags:
      - AIFSFBeacon
    follow: true
    spawnFriendsSearchRadius: 5


