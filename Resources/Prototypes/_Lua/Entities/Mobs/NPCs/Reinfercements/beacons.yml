#region маяк КСО
- type: entity
  parent: BaseItem
  id: AIFSFBeacon
  name: маяк командиров клонов КСО
  description: Маленький маяк, призванный помочь вам управлять отрядами клонов КСО. Просто бросьте его в комнату с противником, и посмотрите как его раскатают в блин сапогами с логотипом НТ.
  categories: [ HideSpawnMenu ]
  components:
  - type: Sprite
    sprite: Objects/Devices/station_beacon.rsi
    drawdepth: BelowFloor
    layers:
    - state: blink
      map: ["base"]
  - type: Appearance
  - type: GenericVisualizer
    visuals:
      enum.NavMapBeaconVisuals.Enabled:
        base:
          True: {state: blink}
          False: {state: icon}
  - type: Item
    size: Small
  - type: Visibility
    layer: 1
  - type: Anchorable
  - type: Tag
    tags:
    - AIFSFBeacon
  - type: TimedDespawn
    lifetime: 3600

