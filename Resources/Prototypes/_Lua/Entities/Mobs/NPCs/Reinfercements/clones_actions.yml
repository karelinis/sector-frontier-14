#region спавн медбота КСО
- type: entity
  categories: [ HideSpawnMenu ]
  id: AIFSFMedibotSpawnAction
  parent: BaseAction
  name: "[color=cyan]Вызвать медибота КСО[/color]"
  components:
  - type: Action
    icon: { sprite : /Textures/Mobs/Silicon/chassis.rsi, state: medical }
    priority: 2
    itemIconStyle: BigAction
    useDelay: 120
    sound:
      path: /Audio/Items/rped.ogg
  - type: TargetAction
    checkCanAccess: false
    range: 0
  - type: WorldTargetAction
    event: !type:ActionGunShootEvent

- type: entity
  categories: [ HideSpawnMenu ]
  id: AIFSFMedicBotThrow
  name: AIFSFMedicBotThrow
  description: Для того что бы медик мог спавнить своего бота
  components:
  - type: Gun
    showExamineText: false
    fireRate: 1
    minAngle: 180
    maxAngle: 180
    selectedMode: SemiAuto
    availableModes:
    - SemiAuto
    soundGunshot: /Audio/Items/rped.ogg
  - type: BasicEntityAmmoProvider
    proto: FSFMedibot
    capacity: 1
    count: 1
  - type: RechargeBasicEntityAmmo
    rechargeCooldown: 120
    rechargeSound: /Audio/_NF/Effects/silence.ogg

#region граната комы КСО
- type: entity
  categories: [ HideSpawnMenu ]
  id: AIFSFStunGreadeThrowAction
  parent: BaseAction
  name: "[color=cyan] кинуть гранату [/color]"
  components:
  - type: Action
    icon: { sprite : Objects/Weapons/Grenades/stingergrenade.rsi, state: icon }
    priority: 2
    itemIconStyle: BigAction
    useDelay: 120
    sound:
      path: /Audio/Weapons/Guns/Gunshots/grenade_launcher.ogg
  - type: TargetAction
    checkCanAccess: false
    range: 0
  - type: WorldTargetAction
    event: !type:ActionGunShootEvent

- type: entity
  categories: [ HideSpawnMenu ]
  id: AIFSFStunGreadeThrow
  name: AIFSFStunGreadeThrow
  description: Для того что бы кома мог кидать свою гранату
  components:
  - type: Gun
    showExamineText: false
    fireRate: 1
    minAngle: 1
    maxAngle: 2
    selectedMode: SemiAuto
    availableModes:
    - SemiAuto
    soundGunshot: /Audio/Weapons/Guns/Gunshots/grenade_launcher.ogg
    soundEmpty: /Audio/_NF/Effects/silence.ogg
  - type: BasicEntityAmmoProvider
    proto: FSFStunGreade
    capacity: 2
    count: 2
  - type: RechargeBasicEntityAmmo
    rechargeCooldown: 120
    rechargeSound: /Audio/_NF/Effects/silence.ogg

