#region базы

- type: htnCompound
  id: AINOCompound
  branches:
    - tasks:
        - !type:HTNCompoundTask
          task: InnateRangedCombatCompound
    - tasks:
        - !type:HTNCompoundTask
          task: MeleeCombatCompound
    - tasks:
        - !type:HTNCompoundTask
          task: FollowCompound
    - tasks:
        - !type:HTNCompoundTask
          task: IdleCompound

- type: entity
  id: AINOMovementSpeedModifierRanged
  abstract: true
  components:
  - type: MovementSpeedModifier
    baseWalkSpeed : 8
    baseSprintSpeed : 8
  - type: FootstepModifier
    footstepSoundCollection:
      collection: FootstepSoldier
      params:
        volume: -3

- type: entity
  id: NOBaseLoadout
  abstract: true
  components:
  - type: Sprite
    drawdepth: Mobs
    layers:
    # Body
    - sprite: _NF/Mobs/Species/Templates/human.rsi
      state: human
    # Suit
    - sprite: Clothing/OuterClothing/Hardsuits/syndicate.rsi
      state: equipped-OUTERCLOTHING
    # Gas tank
    - sprite: _NF/Objects/Tanks/o2n2equal.rsi
      state: equipped-SUITSTORAGE
    # Helmet
    - sprite: Clothing/Head/Hardsuits/syndicate.rsi
      state: on-equipped-HELMET
    # IFF
    - sprite: _NF/Clothing/Neck/Misc/mercenary_iff.rsi
      state: equipped-NECK-off
    - sprite: _NF/Clothing/Neck/Misc/mercenary_iff.rsi
      state: equipped-NECK-on
      color: "#ff0000"
      shader: unshaded
  - type: PointLight
    color: "#00ff00"
    enabled: true
    radius: 6
    energy: 4
    mask: /Textures/Effects/LightMasks/cone.png
    autoRot: true
    netsync: false

#костыль для того что бы их было видно в термалах
- type: body
  id: AINOBody
  name: AINOBody
  root: torso
  slots:
    torso:
      part: TorsoAnimal
      connections:
      - legs
    legs:
      part: LegsAnimal
      connections:
      - feet
    feet:
      part: FeetAnimal

#region база мобов
- type: entity
  abstract: true
  parent:
  - AIClonesBase
  - AINOMovementSpeedModifierRanged
  id: AINOMobBase
  components:
  - type: Body
    prototype: AINOBody
    requiredLegs: 1
    thermalVisibility: true
  - type: NpcFactionMember
    factions:
    - LuaNordFoll
  - type: NPCImprintingOnSpawnBehaviour
    whitelist:
      tags:
      - AINOBeacon
    follow: true
    spawnFriendsSearchRadius: 5


