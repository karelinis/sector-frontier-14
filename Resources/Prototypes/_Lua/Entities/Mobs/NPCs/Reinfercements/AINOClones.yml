#region медбот ЯО
- type: entity
  parent:
  - AINOMovementSpeedModifierRanged
  - MobSiliconBase
  id: NOMedibot
  name: Медибот ЯО
  description: Продвинутый помощник доктора, способный вернуть с того света целый отряд. Осторожно, может быть заряжен кровавой культурой и желанием лечить бойцов Синдиката.
  components:
  - type: Medibot
    treatments:
      Alive:
        reagent: Omnizine
        quantity: 15
        minDamage: 0
        maxDamage: 199
      Critical:
        reagent: Ichor
        quantity: 10
  - type: Sprite
    sprite: /Textures/Mobs/Silicon/chassis.rsi
    drawdepth: Mobs
    layers:
    - state: synd_medical
    - state: synd_medical_e
      shader: unshaded
    - state: synd_medical_l
      shader: unshaded
  - type: HTN
    rootTask:
      task: NOMedibotCompound
  - type: NPCImprintingOnSpawnBehaviour
    whitelist:
      tags:
      - AINOComa
    follow: true
    spawnFriendsSearchRadius: 20
  - type: NpcFactionMember
    factions:
    - LuaNordFoll
  - type: InteractionPopup
    interactSuccessString: petting-success-medibot
    interactFailureString: petting-failure-medibot
    interactSuccessSound:
      path: /Audio/Ambience/Objects/periodic_beep.ogg
  - type: Vocalizer
  - type: DatasetVocalizer
    dataset: MedibotAds
  - type: Inventory
    templateId: medibot
  - type: DoAfter
  - type: Access
    groups:
    - AllAccess
    - Silicon
    tags:
    - CentralCommand
    - NuclearOperative
    - SyndicateAgent
    - Wizard
    - Xenoborg
    - Pirate
  - type: TimedDespawn
    lifetime: 60
  - type: TTS
    enabled: true
    voice: Dictor
  - type: PointLight
    color: "#ff0000"
    enabled: true
    radius: 6
    energy: 4
    mask: /Textures/Effects/LightMasks/cone.png
    autoRot: true
    netsync: false

- type: htnCompound
  id: NOMedibotCompound
  branches:
    - tasks:
        - !type:HTNCompoundTask
          task: InjectNearbyCompound
    - tasks:
        - !type:HTNCompoundTask
          task: FollowCompound
    - tasks:
        - !type:HTNCompoundTask
          task: IdleCompound

