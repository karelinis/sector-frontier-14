#region медбот КБ
- type: entity
  parent:
  - AISCMovementSpeedModifierRanged
  - MobSiliconBase
  id: SCMedibot
  name: Медибот Кодекса Бури
  description: Продвинутый помощник доктора, способный вернуть с того света целый отряд. Осторожно, может быть заряжен кровавой культурой и желанием лечить бойцов Кодекса Бури.
  components:
  - type: Medibot
    treatments:
      Alive:
        reagent: Omnizine
        quantity: 15
        minDamage: 0
        maxDamage: 199
      Critical:
        reagent: Ichor
        quantity: 10
  - type: Sprite
    sprite: /Textures/Mobs/Silicon/chassis.rsi
    drawdepth: Mobs
    layers:
    - state: robot
    - state: robot_e_r
      shader: unshaded
    - state: robot_l
      shader: unshaded
  - type: HTN
    rootTask:
      task: SCMedibotCompound
  - type: NPCImprintingOnSpawnBehaviour
    whitelist:
      tags:
      - AISCComa
    follow: true
    spawnFriendsSearchRadius: 20
  - type: NpcFactionMember
    factions:
    - NFPirate
  - type: InteractionPopup
    interactSuccessString: petting-success-medibot
    interactFailureString: petting-failure-medibot
    interactSuccessSound:
      path: /Audio/Ambience/Objects/periodic_beep.ogg
  - type: Vocalizer
  - type: DatasetVocalizer
    dataset: MedibotAds
  - type: Inventory
    templateId: medibot
  - type: DoAfter
  - type: Access
    groups:
    - AllAccess
    - Silicon
    tags:
    - CentralCommand
    - NuclearOperative
    - SyndicateAgent
    - Wizard
    - Xenoborg
    - Pirate
  - type: TimedDespawn
    lifetime: 60
  - type: TTS
    enabled: true
    voice: Overwatch
  - type: PointLight
    color: "#faa70f"
    enabled: true
    radius: 6
    energy: 4
    mask: /Textures/Effects/LightMasks/cone.png
    autoRot: true
    netsync: false

- type: htnCompound
  id: SCMedibotCompound
  branches:
    - tasks:
        - !type:HTNCompoundTask
          task: InjectNearbyCompound
    - tasks:
        - !type:HTNCompoundTask
          task: FollowCompound
    - tasks:
        - !type:HTNCompoundTask
          task: IdleCompound

