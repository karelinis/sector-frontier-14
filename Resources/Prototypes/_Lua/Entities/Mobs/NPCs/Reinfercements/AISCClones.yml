#region базы

- type: htnCompound
  id: AISCCompound
  branches:
    - tasks:
        - !type:HTNCompoundTask
          task: InnateRangedCombatCompound
    - tasks:
        - !type:HTNCompoundTask
          task: MeleeCombatCompound
    - tasks:
        - !type:HTNCompoundTask
          task: FollowCompound
    - tasks:
        - !type:HTNCompoundTask
          task: IdleCompound

- type: entity
  id: AISCMovementSpeedModifierRanged
  abstract: true
  components:
  - type: MovementSpeedModifier
    baseWalkSpeed : 8
    baseSprintSpeed : 8
  - type: FootstepModifier
    footstepSoundCollection:
      collection: FootstepSoldier
      params:
        volume: -3

#костыль для того что бы их было видно в термалах
- type: body
  id: AISCBody
  name: AISCBody
  root: torso
  slots:
    torso:
      part: TorsoAnimal
      connections:
      - legs
    legs:
      part: LegsAnimal
      connections:
      - feet
    feet:
      part: FeetAnimal

#region база мобов
- type: entity
  abstract: true
  parent:
  - AIClonesBase
  - AISCMovementSpeedModifierRanged
  id: AISCMobBase
  components:
  - type: Body
    prototype: AISCBody
    requiredLegs: 1
    thermalVisibility: true
  - type: NpcFactionMember
    factions:
    - NFPirate
  - type: NPCImprintingOnSpawnBehaviour
    whitelist:
      tags:
      - AISCBeacon
    follow: true
    spawnFriendsSearchRadius: 5


#region болванки





#region болванка штурмовик
- type: entity
  categories: [ HideSpawnMenu ]
  parent:
  - AiSCStormtrooperBase
  - MobPassiveRegen
  id: AiSCStormtrooper
  name: штурмовик Кодекса Бури
  description: Рекрут Кодекса Бури, призванный защитить основные силы. Осторожно, может быть заряжен кровавой культурой и желанием убивать врагов Кодекса Бури.
  components:
  - type: HTN
    rootTask:
       task: AISCCompound
    blackboard:
      VisionRadius: !type:Single
        17
      AggroVisionRadius: !type:Single
        17
      NavClimb: !type:Bool
        true
      NavInteract: !type:Bool
        true
      NavPry: !type:Bool
        true
      NavSmash: !type:Bool
        true
  - type: Damageable
    damageModifierSet: AISCReinforcementStormtrooper
  # - type: NPCUseActionOnTarget
  #   actionId: ActionGravityJump #не может быть пофикшено, т.к. используется им на себе для прыжков в рандомные стороны с криками при угрозе, когда-нибудь сделаю им другой компач - 25Hydra08
  # - type: ActionGrant
  #   actions:
  #   - ActionGravityJump #не может быть пофикшено, т.к. используется им на себе для прыжков в рандомные стороны с криками при угрозе, когда-нибудь сделаю им другой компач - 25Hydra08
  # - type: JumpAbility
  #   jumpDistance: 7
  #   jumpThrowSpeed: 15
  - type: DatasetVocalizer
    dataset: AISCStormtrooperChatter


- type: startingGear
  id: SCLoadoutStormtrooper
  equipment:
    gloves: ClothingHandsGlovesColorSCStormtrooper
    back: JetpackVoid
    belt: ClothingBeltERTFilled
    shoes: ClothingShoesBootsSpetsnaz

- type: entity
  id: SCBaseLoadoutStormtrooper
  abstract: true
  components:
  - type: Sprite
    drawdepth: Mobs
    layers:
    # Body
    - sprite: _NF/Mobs/Species/Templates/human.rsi
      state: human
    # Suit
    - sprite: _Lua/Clothing/OuterClothing/SCHardsuits/heavy_standart.rsi
      state: equipped-OUTERCLOTHING
    # Gas tank
    - sprite: _NF/Objects/Tanks/o2n2equal.rsi
      state: equipped-SUITSTORAGE
    # Helmet
    - sprite: _Lua/Clothing/Head/SCHardsuits/heavy_standart.rsi
      state: on-equipped-HELMET
    # IFF
    - sprite: _NF/Clothing/Neck/Misc/mercenary_iff.rsi
      state: equipped-NECK-off
    - sprite: _NF/Clothing/Neck/Misc/mercenary_iff.rsi
      state: equipped-NECK-on
      color: "#faa70f"
      shader: unshaded
  - type: PointLight
    color: "#faa70f"
    enabled: true
    radius: 6
    energy: 4
    mask: /Textures/Effects/LightMasks/cone.png
    autoRot: true
    netsync: false

- type: entity
  id: AiSCStormtrooperBase
  parent:
  - SCBaseLoadoutStormtrooper
  - MobSCBreacherStormtrooper
  categories: [ HideSpawnMenu ]
  components:
  - type: Loadout
    prototypes:
    - SCLoadoutStormtrooper

#перчи штурмовика
- type: entity
  parent: ClothingHandsGlovesColorBlackSMG
  id: ClothingHandsGlovesColorSCStormtrooper
