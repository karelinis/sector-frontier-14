#region телепорты
- type: entity
  parent: [ BaseItem ]
  id: AiTeleportSCAdminVariable
  name: телепорт подкреплений Кодекса Бури
  suffix: "админский, вариативный, не для игроков"
  description: Универсальный телепорт рекрутов Кодекса Бури, оснащённый модулем автозарядки.
  components:
  - type: Sprite
    sprite: Objects/Devices/door_remote.rsi
    layers:
    - state: door_remotebase
    - state: door_remotelightscolour
      color: "#ff9100"
    - state: door_remotescreencolour
      color: "#836000"
  - type: Item
    storedRotation: -90
  - type: Battery
    maxCharge: 360000000
    startingCharge: 360000000
  - type: BatterySelfRecharger
    autoRecharge: true
    autoRechargeRate: 100000
  - type: Gun
    fireRate: 1
    soundGunshot:
      path: /Audio/Machines/phasein.ogg
  - type: EnergyGun
    fireModes:
    - proto: AiSCComaSpawner
      fireCost: 10
      name: командир рекрутов Кодекса Бури
    - proto: AISCBeacon
      fireCost: 10
      name: маяк командира рекрутов Кодекса Бури
    - proto: AiSCStormtrooperSpawner
      fireCost: 10
      name: штурмовик Кодекса Бури
    - proto: AiSCSniperSpawner
      fireCost: 10
      name: снайпер Кодекса Бури
    - proto: AiSСMedicSpawner
      fireCost: 10
      name: медик Кодекса Бури
  - type: ProjectileBatteryAmmoProvider
    proto: AiSCComaSpawner
    fireCost: 10

- type: entity
  parent: [ BaseItem ]
  id: AiTeleportSCAdmin
  name: телепорт подкреплений Кодекса Бури
  suffix: "админский, отрядный, не для игроков"
  description: Универсальный телепорт рекрутов Кодекса Бури, оснащённый модулем автозарядки.
  components:
  - type: Sprite
    sprite: Objects/Devices/door_remote.rsi
    layers:
    - state: door_remotebase
    - state: door_remotelightscolour
      color: "#ff9100"
    - state: door_remotescreencolour
      color: "#836000"
  - type: Item
    storedRotation: -90
  - type: RechargeBasicEntityAmmo
    rechargeCooldown: 1
    rechargeSound: /Audio/Machines/phasein.ogg
  - type: BasicEntityAmmoProvider
    proto: AISCTeleportSpawner
    capacity: 100
    count: 100
  - type: Gun
    fireRate: 1
    selectedMode: FullAuto
    availableModes:
      - FullAuto
    soundGunshot: /Audio/Machines/phasein.ogg
    soundEmpty: /Audio/_NF/Effects/silence.ogg

- type: entity
  parent: [ BaseItem ]
  id: AiTeleportSC
  name: телепорт подкреплений Кодекса Бури
  suffix: "отрядный, для игроков"
  description: Универсальный телепорт рекрутов Кодекса Бури, оснащённый модулем автозарядки. Способен отправить 3 полных отряда за час.
  components:
  - type: Sprite
    sprite: Objects/Devices/door_remote.rsi
    layers:
    - state: door_remotebase
    - state: door_remotelightscolour
      color: "#ff9100"
    - state: door_remotescreencolour
      color: "#836000"
  - type: Item
    storedRotation: -90
  - type: RechargeBasicEntityAmmo
    rechargeCooldown: 1200
    rechargeSound: /Audio/Machines/phasein.ogg
  - type: BasicEntityAmmoProvider
    proto: AISCTeleportSpawner
    capacity: 2
    count: 2
  - type: Gun
    fireRate: 1
    selectedMode: FullAuto
    availableModes:
      - FullAuto
    soundGunshot: /Audio/Machines/phasein.ogg
    soundEmpty: /Audio/_NF/Effects/silence.ogg

#region спавнер бойцов
- type: entity
  name: AISCTeleportSpawner
  id: AISCTeleportSpawner
  parent: MarkerBase
  categories: [ HideSpawnMenu ]
  components:
  - type: EntityTableSpawner
    deleteSpawnerAfterSpawn: true
    offset: 0.5
    table: !type:AllSelector
      children:
      - !type:EntSelector
        id: AISCBeacon
      - !type:EntSelector
        id: AiSCComaSpawner
      - !type:EntSelector
        id: AiSCSniperSpawner
      - !type:EntSelector
        id: AiSСMedicSpawner
      - !type:EntSelector
        id: AiSCStormtrooperSpawner

