#region Эндоскелеты
- type: construction
  id: HumanoidEndoskeleton
  graph: HumanoidEndoskeletonGraph
  startNode: start
  targetNode: HumanoidEndoskeleton
  category: BioCategory
  objectType: Item
  placementMode: SnapgridCenter
  canBuildInImpassable: false

- type: constructionGraph
  id: HumanoidEndoskeletonGraph
  start: start
  graph:
  - node: start
    edges:
    - to: HumanoidEndoskeleton
      completed:
      - !type:SnapToGrid
      steps:
      - tag: CyborgEndoskeleton
        name: CyborgEndoskeleton-name
        icon:
          sprite: Objects/Specific/Robotics/cyborg_parts.rsi
          state: robo_suit
        doAfter: 2
      - material: Steel
        amount: 10
        doAfter: 2
      - material: Plastic
        amount: 15
        doAfter: 2
      - material: Magmite
        amount: 1
        doAfter: 2
  - node: HumanoidEndoskeleton
    entity: HumanoidEndoskeleton

