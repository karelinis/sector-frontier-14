#region общая база
- type: entity
  parent: [ BaseMobHuman, MobPassiveRegen ]
  id: MobBodyguardBase
  abstract: true
  components:
  - type: RandomHumanoidAppearance
    randomizeName: true
  - type: HTN
    rootTask:
       task: BodyguardCompound
    sleepPlayerCheckRangeOverride: 150
    blackboard:
      VisionRadius: !type:Single
        17
      AggroVisionRadius: !type:Single
        17
      NavClimb: !type:Bool
        true
      NavInteract: !type:Bool
        true
      NavPry: !type:Bool
        true
      NavSmash: !type:Bool
        true
  - type: NPCImprintingOnSpawnBehaviour
    whitelist:
      components:
      - HumanoidAppearance
    follow: true
    spawnFriendsSearchRadius: 3
  - type: AutoWakeUp

- type: htnCompound
  id: BodyguardCompound
  branches:
    - tasks:
        - !type:HTNCompoundTask
          task: RangedCombatCompound
    - tasks:
        - !type:HTNCompoundTask
          task: MeleeCombatCompound
    - tasks:
        - !type:HTNCompoundTask
          task: FollowCompound
    - tasks:
        - !type:HTNCompoundTask
          task: IdleCompound

#region агрессивный
- type: entity
  parent: [ BaseMobHuman, MobPassiveRegen ]
  id: MobBodyguardAgressive
  name: телохранитель агрессивный
  description: Агрессивный телохранитель, спора которого не ограничена никакими модулями. Вы сами это создали, вам это и убивать...
  components:
  - type: RandomHumanoidAppearance
    randomizeName: true
  - type: TTS
    enabled: true
    voice: Thrud
  - type: HTN
    rootTask:
       task: BodyguardCompound
    blackboard:
      VisionRadius: !type:Single
        17
      AggroVisionRadius: !type:Single
        17
      NavClimb: !type:Bool
        true
      NavInteract: !type:Bool
        true
      NavPry: !type:Bool
        true
      NavSmash: !type:Bool
        true
  - type: NpcFactionMember
    factions:
    - SimpleHostile
  - type: Vocalizer
    minVocalizeInterval: 30
    maxVocalizeInterval: 120
  - type: DatasetVocalizer
    dataset: spacepunkhumanoidchatter
  - type: AutoWakeUp
#монтаж и демонтаж
  - type: Construction
    graph: MobBodyguardAgressiveGraph
    node: MobBodyguardAgressive
  - type: Butcherable
    spawned:
    - id: MobBodyguardAgressiveGib
      amount: 1
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 400
      behaviors:
      - !type:DoActsBehavior
        acts: ["Destruction"]
      - !type:PlaySoundBehavior
        sound:
          collection: gib
      - !type:SpawnEntitiesBehavior
        spawn:
          MobBodyguardAgressiveGib:
            min: 1
            max: 1

#спавнер для гиба
- type: entity
  name: MobBodyguardAgressiveGib
  id: MobBodyguardAgressiveGib
  parent: MarkerBase
  categories: [ HideSpawnMenu ]
  components:
  - type: Sprite
    layers:
    - state: red
    - sprite: _NF/Mobs/Aliens/flesh.rsi
      state: lover
    - state: ai
  - type: EntityTableSpawner
    deleteSpawnerAfterSpawn: true
    offset: 0.5
    table: !type:AllSelector
      children:
      - !type:EntSelector
        id: HumanoidEndoskeleton
      - !type:EntSelector
        id: CrimsonSporeFleshWaken1
      - !type:EntSelector
        id: CrimsonSporeFleshWaken1
      - !type:EntSelector
        id: CrimsonSporeFleshWaken1
      - !type:EntSelector
        id: CrimsonSporeFleshWaken1
      - !type:EntSelector
        id: CrimsonSporeFleshWaken1

