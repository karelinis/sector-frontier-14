- type: construction
  id: MobBodyguardAgressive
  graph: MobBodyguardAgressiveGraph
  startNode: start
  targetNode: MobBodyguardAgressive
  category: BioCategory
  objectType: Item
  placementMode: SnapgridCenter
  canBuildInImpassable: false

- type: constructionGraph
  id: MobBodyguardAgressiveGraph
  start: start
  graph:
  - node: start
    edges:
    - to: MobBodyguardAgressive
      completed:
      - !type:SnapToGrid
      steps:
      - tag: HumanoidEndoskeleton
        name: HumanoidEndoskeleton-name
        icon:
          sprite: _NF/Mobs/RogueSilicons/robots.rsi
          state: body_light
        doAfter: 10
      - material: CrimsonSporeFleshStackWaken
        amount: 5
        doAfter: 10
  - node: MobBodyguardAgressive
    entity: MobBodyguardAgressive

