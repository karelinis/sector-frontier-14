#region эндоскелеты





#region база
- type: entity
  id: HumanoidEndoskeleton
  name: эндоскелет гуманоида
  description: Готовая рама для сборки вашего личного телохранителя. Отсутствует модуль контроля сознания.
  components:
  - type: Sprite
    drawdepth: Mobs
    sprite: _NF/Mobs/RogueSilicons/robots.rsi
    layers:
    - state: body_light
      map: [ "body" ]
    - state: head_light
      map: [ "head" ]
    - state: head_light_eye
      map: [ "eyes" ]
      color: "#000000"
      shader: unshaded
    - state: l_arm_light
      map: [ "leftArm" ]
    - state: r_arm_light
      map: [ "rightArm" ]
    - state: l_leg_light
      map: [ "leftLeg" ]
    - state: r_leg_light
      map: [ "rightLeg" ]
    - state: mask_null
      map: [ "decor" ]
    - state: mask_null
      map: [ "overlay" ]
    - state: mask_null
      map: [ "overlayUnshaded" ]
      shader: unshaded
  - type: Clickable
  - type: InteractionOutline
  - type: Physics
    bodyType: Dynamic
    fixedRotation: false
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeAabb
          bounds: "-0.25,-0.25,0.25,0.25"
        density: 100
        mask:
        - MobMask
        layer:
        - MobLayer
        restitution: 0.3
        friction: 0.2
  - type: Appearance
  - type: Pullable
#монтаж и демонтаж
  - type: Construction
    graph: HumanoidEndoskeletonGraph
    node: HumanoidEndoskeleton
  - type: Damageable
    damageContainer: StructuralInorganic
  - type: Butcherable
    spawned:
    - id: HumanoidEndoskeletonGib
      amount: 1
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 100
      behaviors:
      - !type:DoActsBehavior
        acts: ["Destruction"]
      - !type:PlaySoundBehavior
        sound:
          collection: MetalSlam
      - !type:SpawnEntitiesBehavior
        spawn:
          HumanoidEndoskeletonGib:
            min: 1
            max: 1
  - type: Tag
    tags:
    - HumanoidEndoskeleton

#спавнер для гиба
- type: entity
  name: HumanoidEndoskeletonGib
  id: HumanoidEndoskeletonGib
  parent: MarkerBase
  categories: [ HideSpawnMenu ]
  components:
  - type: Sprite
    layers:
    - state: red
    - sprite: _NF/Mobs/Aliens/flesh.rsi
      state: lover
    - state: ai
  - type: EntityTableSpawner
    deleteSpawnerAfterSpawn: true
    offset: 0.5
    table: !type:AllSelector
      children:
      - !type:EntSelector
        id: SheetMagmite1
      - !type:EntSelector
        id: SheetPlastic10
      - !type:EntSelector
        id: SheetPlastic5
      - !type:EntSelector
        id: SheetSteel10
      - !type:EntSelector
        id: CyborgEndoskeleton

