#region Сумка
- type: entity
  parent: ClothingBackpackDuffel
  id: HolyPainRankKit
  name: блюспейс кристал HolyPain
  description: Уникальный артефакт на золотой цепи — творение мастера HolyPain, стабилизированный в условиях мёртвого космоса и вручаемый как знак заслуг за вклад в одноимённый проект.
  categories: [ HideSpawnMenu ]
  components:
  - type: Sprite
    sprite: _Lua/Sponsor/HolyPain/HolyPainCrystalBag.rsi
  - type: Storage
    maxItemSize: Huge
    grid:
    - 0,0,14,7
    storageOpenSound:
      collection: CrystalBagOpening
      params:
        variation: 0.125
    storageCloseSound:
      collection: CrystalBagClosing
      params:
        variation: 0.125
    storageInsertSound:
      collection: CrystalBagItemInsert
      params:
        variation: 0.125
    storageRemoveSound:
      collection: CrystalBagItemRemove
      params:
        variation: 0.125
  - type: ClothingSpeedModifier
    walkModifier: 1
    sprintModifier: 1
  - type: Clothing
    sprite: _Lua/Sponsor/HolyPain/HolyPainCrystalBag.rsi
    quickEquip: false
    slots:
    - back
    equipSound:
      collection: CrystalBagEquip
      params:
        volume: -9
        variation: 0.125
    unequipSound:
      collection: CrystalBagUnequip
      params:
        volume: -9
        variation: 0.125
  - type: EmitSoundOnPickup
    sound:
      collection: CrystalBagPickup
      params:
        volume: -9
        variation: 0.125
  - type: EmitSoundOnDrop
    sound:
      collection: CrystalBagDrop
      params:
        volume: -11
        variation: 0.125
  - type: EmitSoundOnLand
    sound:
      collection: CrystalBagLand
      params:
        volume: -11
        variation: 0.125
  - type: HardsuitIdentification
    securityMode: Acid
    emaggable: false
    gibWearer: false
    createAcidEffect: true
  - type: HardsuitDNARadial
  - type: TTS
    voice: Cirilla
  - type: Speech

