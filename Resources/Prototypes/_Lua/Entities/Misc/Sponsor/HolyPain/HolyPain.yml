#region Плюшевая Эри
#база говорящей плюшки
- type: entity
  abstract: true
  parent: [BaseItem, BaseStash]
  id: BasePlushieSpeakable
  components:
  - type: EmitSoundOnCollide
    sound:
      collection: ToySqueak
      params:
        volume: -4
  - type: EmitSoundOnLand
    sound:
      collection: ToySqueak
      params:
        volume: -4
  - type: UseDelay
    delay: 5
  - type: TriggerOnActivate
  - type: TriggerOnSignal
  - type: Speech
  - type: DeviceNetwork
    deviceNetId: Wireless
    receiveFrequencyId: BasicDevice
  - type: DeviceLinkSink
    ports:
    - Trigger
  - type: MeleeWeapon
    # attackRate: 0.333 # Frontier
    wideAnimationRotation: 180
    soundHit:
      collection: ToySqueak
      params:
        volume: -4
    damage:
      types:
        Blunt: 0
    hidden: true
  - type: PhysicalComposition
    materialComposition:
      Cloth: 100
  - type: StaticPrice
    price: 5
  - type: Food
    requiresSpecialDigestion: true
    useSound:
      collection: ToySqueak
      params:
        volume: -4
    delay: 2
  - type: SolutionContainerManager
    solutions:
      food:
        maxVol: 5 # Frontier: 10<5
        reagents:
        - ReagentId: Fiber
          Quantity: 5 # Frontier: 10<5
  - type: Tag
    tags:
    - Payload
    - ClothMade
  - type: MothFood # Frontier

