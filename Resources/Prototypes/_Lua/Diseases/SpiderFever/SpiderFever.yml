#region Паучья лихорадка
- type: disease
  id: SpiderFever
  name: SpiderFever-name
  cureResist: 1
  infectious: true
  stages:
  - 0
  - 30
  - 300
  - 600
  effects:
  # сообщения о заражении
  - !type:DiseasePopUp
    probability: 0.015
    message: Вы чувствуете себя нехорошо...
    visualType: Medium
    stages:
    - 0
  - !type:DiseasePopUp
    probability: 0.03
    message: Ваше сознание туманится...
    visualType: Medium
    stages:
    - 1
  - !type:DiseasePopUp
    probability: 0.03
    message: Вы ощущаете тягу к тёмным углам...
    visualType: Medium
    stages:
    - 1
  - !type:DiseasePopUp
    probability: 0.05
    message: Вам хочется плести шёлк...
    visualType: Medium
    stages:
    - 2
  - !type:DiseasePopUp
    probability: 0.05
    message: Вы реально хотите забиться в тёмный угол...
    visualType: Medium
    stages:
    - 2
    - 3
  - !type:DiseasePopUp
    probability: 0.05
    message: Вы чувствуете непреодолимую тягу к техническим тоннелям...
    visualType: Medium
    stages:
    - 2
    - 3
  - !type:DiseasePopUp
    probability: 0.05
    message: Вы мечтаете о паутине...
    visualType: Medium
    stages:
    - 2
    - 3
  # Физические симптомы
  - !type:DiseaseSnough
    probability: 0.03
    emote: Cough
    stages:
    - 0
  - !type:DiseaseSnough
    probability: 0.03
    emote: Scream
    stages:
    - 0
  - !type:DiseaseAdjustReagent
    probability: 0.020
    reagent:
      ReagentId: Ipecac
    amount: 5
    stages:
    - 1
  - !type:DiseaseAdjustReagent
    probability: 0.015
    reagent:
      ReagentId: Razorium
    amount: 1
    stages:
    - 1
  - !type:DiseaseAdjustReagent
    probability: 0.025
    reagent:
      ReagentId: Licoxide
    amount: 0.5
    stages:
    - 2
    - 3
  - !type:DiseaseAdjustReagent
    probability: 0.015
    reagent:
      ReagentId: Razorium
    amount: 1
    stages:
    - 2
    - 3
  # дефекты речи от болезни
  - !type:DiseaseAdjustReagent
    probability: 0.05
    reagent:
      ReagentId: Ethanol
    amount: 1
    stages:
    - 2
    - 3
  - !type:DiseaseAdjustReagent
    probability: 0.05
    reagent:
      ReagentId: SpaceDrugs
    amount: 2
    stages:
    - 2
    - 3
  # урон от генетических повреждений от болезни
  - !type:DiseaseHealthChange
    probability: 0.025
    damage:
      types:
        Genetic: 0.5
    stages:
    - 2
    - 3
  # полиморфа на крайней стадии заражения
  - !type:DiseasePolymorph
    probability: 0.1
    polymorphId: DiseaseMorphSpider
    polymorphMessage: Теперь вы становитесь пауком...
    polymorphSound:
      path: /Audio/Effects/demon_consume.ogg
    stages:
    - 3
  cures:
  - !type:DiseaseReagentCure
    reagent:
      ReagentId: Antibiotic
    min: 10
    cureChance: 0.1
    stages:
    - 0
  - !type:DiseaseReagentCure
    reagent:
      ReagentId: Arachnostatine
    min: 2
    cureChance: 0.1
    stages:
    - 1
    - 2
    - 3

- type: polymorph
  id: DiseaseMorphSpider
  configuration:
    entity: MobDiseaseSpider
    forced: true
    inventory: None
    transferName: true
    revertOnCrit: false
    revertOnDeath: true
    exitPolymorphSound: /Audio/Effects/demon_consume.ogg

#region морфа игрока
- type: entity
  parent: [ SimpleNonHTNMobBase, MobPassiveRegen ]
  id: MobDiseaseSpider
  name: тарантул
  description: Поистине милейшее создание с шестью замечательными лапками и милейшими восемью глазками. Выглядит так, словно когда-то было гуманоидом.
  suffix: "NoAI, DiseaseMorph"
  components:
  - type: Sprite
    drawdepth: Mobs
    layers:
    - map: ["enum.DamageStateVisualLayers.Base", "movement"]
      state: tarantula
      sprite: Mobs/Animals/spider.rsi
  - type: SpriteMovement
    movementLayers:
      movement:
        state: tarantula-moving
    noMovementLayers:
      movement:
        state: tarantula
  - type: DamageStateVisuals
    states:
      Alive:
        Base: tarantula
      Critical:
        Base: tarantula_dead
      Dead:
        Base: tarantula_dead
  - type: Carriable #DeltaV ##shiva deserves to be held
  - type: Physics
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeCircle
          radius: 0.35
        density: 130
        mask:
        - MobMask
        layer:
        - MobLayer
  - type: CombatMode
  - type: Body
    prototype: AnimalHemocyanin
  - type: MobThresholds
    thresholds:
      0: Alive
      90: Dead
  - type: SolutionContainerManager
    solutions:
      melee:
        maxVol: 30
  - type: SolutionRegeneration
    solution: melee
    generated:
      reagents:
      - ReagentId: Mechanotoxin
        Quantity: 1
  - type: MeleeChemicalInjector
    transferAmount: 0.75
    solution: melee
  - type: MeleeWeapon
    altDisarm: false
    angle: 0
    animation: WeaponArcBite
    soundHit:
      path: /Audio/Effects/bite.ogg
    damage:
      types:
        Piercing: 6
  - type: ReplacementAccent
    accent: xeno
  - type: InteractionPopup
    successChance: 0.5
    interactSuccessString: petting-success-tarantula
    interactFailureString: petting-failure-generic
    interactSuccessSpawn: EffectHearts
    interactSuccessSound:
      path: /Audio/Animals/snake_hiss.ogg
  - type: NoSlip
  - type: Spider
  - type: IgnoreSpiderWeb
  - type: Bloodstream
    bloodMaxVolume: 150
    bloodReagent: CopperBlood
  - type: Speech
    speechVerb: Arachnid
    speechSounds: Arachnid
    allowedEmotes: ['Click', 'Chitter']
  - type: Vocal
    sounds:
      Male: UnisexArachnid
      Female: UnisexArachnid
      Unsexed: UnisexArachnid
  - type: TypingIndicator
    proto: spider
  - type: Tag
    tags:
    - DoorBumpOpener
    - FootstepSound
    - CanPilot
  - type: Prying # Open door from xeno.yml.
    pryPowered: true
    force: true
    speedModifier: 1.5
    useSound:
      path: /Audio/Items/crowbar.ogg
  - type: PassiveDamage # Slight passive regen. Assuming one damage type, comes out to about 4 damage a minute from base.yml.
    allowedStates:
    - Alive
    damageCap: 89
    damage:
      types:
        Poison: -0.07
      groups:
        Brute: -0.07
        Burn: -0.07
  - type: NightVision # Goobstation - Nigthvision
    color: "#808080"
    activateSound: null
    deactivateSound: null
  - type: TTS
    enabled: true
    voice: Gman
