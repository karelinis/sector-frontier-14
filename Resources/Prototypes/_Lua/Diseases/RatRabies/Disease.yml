#region Крысиное бешенство
- type: disease
  id: RatRabies
  name: RatRabies-name
  cureResist: 1
  infectious: true
  stages:
  - 0
  - 30
  - 300
  - 900
  effects:
  # сообщения о заражении
  - !type:DiseasePopUp
    probability: 0.015
    message: Вы чувствуете себя нехорошо...
    visualType: Medium
    stages:
    - 0
  - !type:DiseasePopUp
    probability: 0.03
    message: Ваше сознание туманится...
    visualType: Medium
    stages:
    - 1
  - !type:DiseasePopUp
    probability: 0.03
    message: Вы ощущаете тягу к сыру...
    visualType: Medium
    stages:
    - 1
  - !type:DiseasePopUp
    probability: 0.05
    message: Вам хочется сыр...
    visualType: Medium
    stages:
    - 2
  - !type:DiseasePopUp
    probability: 0.05
    message: Вы реально хотите сыр...
    visualType: Medium
    stages:
    - 2
    - 3
  - !type:DiseasePopUp
    probability: 0.05
    message: Сыр...
    visualType: Medium
    stages:
    - 2
    - 3
  - !type:DiseasePopUp
    probability: 0.05
    message: СЫР!!!
    visualType: Medium
    stages:
    - 2
    - 3
  # Физические симптомы
  - !type:DiseaseSnough
    probability: 0.03
    emote: Cough
    stages:
    - 0
  - !type:DiseaseSnough
    probability: 0.03
    emote: Scream
    stages:
    - 0
  - !type:DiseaseAdjustReagent
    probability: 0.020
    reagent:
      ReagentId: Ipecac
    amount: 5
    stages:
    - 1
  - !type:DiseaseAdjustReagent
    probability: 0.015
    reagent:
      ReagentId: Razorium
    amount: 1
    stages:
    - 1
  - !type:DiseaseAdjustReagent
    probability: 0.025
    reagent:
      ReagentId: Licoxide
    amount: 0.5
    stages:
    - 2
    - 3
  - !type:DiseaseAdjustReagent
    probability: 0.015
    reagent:
      ReagentId: Razorium
    amount: 1
    stages:
    - 2
    - 3
  # дефекты речи от болезни
  - !type:DiseaseAdjustReagent
    probability: 0.05
    reagent:
      ReagentId: Ethanol
    amount: 1
    stages:
    - 2
    - 3
  - !type:DiseaseAdjustReagent
    probability: 0.05
    reagent:
      ReagentId: SpaceDrugs
    amount: 2
    stages:
    - 2
    - 3
  # урон от генетических повреждений от болезни
  - !type:DiseaseHealthChange
    probability: 0.025
    damage:
      types:
        Genetic: 0.5
    stages:
    - 2
    - 3
  # полиморфа на крайней стадии заражения
  - !type:DiseasePolymorph
    probability: 0.1
    polymorphId: DiseaseMorphRatKing
    polymorphMessage: Теперь вы становитесь мышью...
    polymorphSound:
      path: /Audio/Effects/demon_consume.ogg
    stages:
    - 3
  - !type:DiseasePolymorph
    probability: 0.1
    polymorphId: DiseaseMorphRatKingBuff
    polymorphMessage: Теперь вы становитесь большой мышью...
    polymorphSound:
      path: /Audio/Effects/demon_consume.ogg
    stages:
    - 3
  cures:
  - !type:DiseaseReagentCure
    reagent:
      ReagentId: Antibiotic
    min: 10
    cureChance: 0.1
    stages:
    - 0
  - !type:DiseaseReagentCure
    reagent:
      ReagentId: Bananocide
    min: 2
    cureChance: 0.1
    stages:
    - 1
    - 2
    - 3

- type: polymorph
  id: DiseaseMorphRatKing
  configuration:
    entity: MobDiseaseRatKing
    forced: true
    inventory: None
    transferName: true
    revertOnCrit: false
    revertOnDeath: true
    exitPolymorphSound: /Audio/Effects/demon_consume.ogg

- type: polymorph
  id: DiseaseMorphRatKingBuff
  configuration:
    entity: MobDiseaseRatKingBuff
    forced: true
    inventory: None
    transferName: true
    revertOnCrit: false
    revertOnDeath: true
    exitPolymorphSound: /Audio/Effects/demon_consume.ogg


#region морфы игроков
- type: entity
  name: король крыс
  id: MobDiseaseRatKing
  parent: [ SimpleNonHTNMobBase ]
  description: Он крыс, и он тут царь.
  suffix: "NoAI, DiseaseMorph"
  components:
  - type: CombatMode
  - type: MovementSpeedModifier
    baseWalkSpeed : 3.00
    baseRunningSpeed : 5.00
  - type: InputMover
  - type: MobMover
  - type: Reactive
    groups:
      Flammable: [Touch]
      Extinguish: [Touch]
  - type: NpcFactionMember
    factions:
    - SimpleHostile
  - type: Sprite
    drawdepth: SmallMobs
    sprite: Mobs/Animals/regalrat.rsi
    layers:
    - map: ["enum.DamageStateVisualLayers.Base"]
      state: regalrat
    - map: [ "enum.DamageStateVisualLayers.BaseUnshaded" ]
      state: eyes
      shader: unshaded
  - type: TypingIndicator
    proto: regal
  - type: Physics
    bodyType: KinematicController
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeCircle
          radius: 0.3
        density: 230
        mask:
        - SmallMobMask
        layer:
        - SmallMobLayer
  - type: MobState
  - type: MobThresholds
    thresholds:
      0: Alive
      200: Dead
  - type: MeleeWeapon
    altDisarm: false
    soundHit:
        path: /Audio/Weapons/Xeno/alien_claw_flesh1.ogg
    angle: 0
    animation: WeaponArcClaw
    damage:
      types:
        Slash: 12
        Piercing: 8
  - type: Body
    prototype: Rat
    requiredLegs: 1 # TODO: More than 1 leg
  - type: Hunger # probably should be prototyped
    thresholds:
      Overfed: 200
      Okay: 150
      Peckish: 100
      Starving: 50
      Dead: 0
    baseDecayRate: 0.01666666666
  - type: Thirst
    thresholds:
      OverHydrated: 600
      Okay: 450
      Thirsty: 300
      Parched: 150
      Dead: 0
    baseDecayRate: 0.1
  - type: DamageStateVisuals
    states:
      Alive:
        Base: regalrat
        BaseUnshaded: eyes
      Critical:
        Base: critical
      Dead:
        Base: dead
  - type: Tag
    tags:
      - CannotSuicide
      - FootstepSound
  - type: NoSlip
  - type: RatKing
    hungerPerArmyUse: 25
    hungerPerDomainUse: 30
  - type: Rummager # DeltaV: Make rummaging a generic component
  - type: MobsterAccent
  - type: Speech
    speechVerb: SmallMob
  - type: Sharp
  - type: NightVision # Goobstation - Nigthvision
    toggleAction: null
    color: "#808080"
    activateSound: null
    deactivateSound: null
  - type: TTS
    enabled: true
    voice: Ycf

- type: entity
  id: MobDiseaseRatKingBuff
  parent: MobDiseaseRatKing
  suffix: "NoAI, DiseaseMorph"
  components:
  - type: Sprite
    sprite: Mobs/Animals/buffrat.rsi
    scale: 1.2, 1.2
    layers:
    - map: ["enum.DamageStateVisualLayers.Base"]
      state: regalrat
    - map: [ "enum.DamageStateVisualLayers.BaseUnshaded"]
      state: eyes
      shader: unshaded
  - type: MobState
  - type: MobThresholds
    thresholds:
      0: Alive
      350: Dead
  - type: MeleeWeapon
    altDisarm: false
    soundHit:
        path: /Audio/Weapons/Xeno/alien_claw_flesh2.ogg
    angle: 0
    attackRate: 0.75
    animation: WeaponArcFist
    damage:
      types:
        Blunt: 66 #oof ouch owie my bones
  - type: SlowOnDamage
    speedModifierThresholds:
      200: 0.7
      250: 0.5
  - type: TTS
    enabled: true
    voice: Thrud
