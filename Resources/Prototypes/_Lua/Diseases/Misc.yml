- type: entity
  parent: MarkerBase
  id: RandomDiseaseRatsSpawn
  name: RandomDiseaseRatsSpawn
  components:
  - type: Sprite
    layers:
    - state: green
    - sprite: Objects/Materials/materials.rsi
      state: diamond
  - type: RandomSpawner
