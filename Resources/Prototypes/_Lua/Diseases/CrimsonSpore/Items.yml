  components:
  - type: Sprite
    sprite: _Lua/Diseases/Objects/Misc/CrimsonSporeFlesh.rsi
    state: plain
    color: "#9b2525"
  - type: SolutionContainerManager
    solutions:
      food:
        maxVol: 40
        reagents:
        - ReagentId: CrimzonSporeBlood
          Quantity: 15
        - ReagentId: UncookedAnimalProteins
          Quantity: 10
        - ReagentId: Fat
          Quantity: 10
  - type: StaticPrice
    price: 3000
  - type: Stack
    stackType: CrimsonSporeFleshStackWaken

- type: entity
  parent: CrimsonSporeFleshWaken
  id: CrimsonSporeFleshWaken1
  suffix: Single
  description: Кусок мяса с пугающей способностью к ассимиляции с другими похожими кусками мяса.
  components:
  - type: Stack
    stackType: CrimsonSporeFleshStackWaken
    count: 1
  - type: Construction
    graph: CrimsonSporeFleshWaken1Graph
    node: CrimsonSporeFleshWaken1

- type: stack
  id: CrimsonSporeFleshStackWaken
  name: CrimsonSporeFleshStackWaken-name
  icon: { sprite: _Lua/Diseases/Objects/Misc/CrimsonSporeFlesh.rsi, state: plain, color: "#9b2525" }
  spawn: CrimsonSporeFleshWaken
  maxCount: 30