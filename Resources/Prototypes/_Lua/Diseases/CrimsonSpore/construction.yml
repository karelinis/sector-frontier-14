#region рецепты постройки





#region блокер
- type: construction
  id: BiohazardousFleshBlocker
  graph: BiohazardousFleshBlockerGraph
  startNode: start
  targetNode: BiohazardousFleshBlocker
  category: BioCategory
  objectType: Structure
  placementMode: SnapgridCenter
  canBuildInImpassable: true

- type: constructionGraph
  id: BiohazardousFleshBlockerGraph
  start: start
  graph:
  - node: start
    edges:
    - to: BiohazardousFleshBlocker
      completed:
      - !type:SnapToGrid
      steps:
      - material: CrimsonSporeFleshStack
        amount: 5
        doAfter: 10
  - node: BiohazardousFleshBlocker
    entity: BiohazardousFleshBlocker


