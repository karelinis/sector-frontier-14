#region стрелок
- type: entity
  parent: [ BiohazardousMobBase, MobPassiveRegen ]
  id: BiohazardousShooter
  name: стрелок
  description: Безвольный сгусток красной споры и мяса, оснащённый органической пушкой вместо руки. Он с лёгкостью может превратить вас в подушечку для своих игл, если увидит.
  # categories: [ HideSpawnMenu ]
  components:
  - type: Sprite
    sprite: _Lua/Diseases/Mobs/BiohazardMobs.rsi
    layers:
    - map: [ "enum.DamageStateVisualLayers.Base" ]
      state: shooting
  - type: DamageStateVisuals
    states:
      Alive:
        Base: shooting
      Critical:
        Base: dead
      Dead:
        Base: dead
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 200
      behaviors:
      - !type:DoActsBehavior
        acts: ["Destruction"]
      - !type:PlaySoundBehavior
        sound:
          collection: gib
      - !type:SpawnEntitiesBehavior
        spawn:
          CrimsonSporeFlesh1:
            min: 2
            max: 7
  - type: HTN
    rootTask:
       task: BiohazardousHTNRangedCompound
    blackboard:
      VisionRadius: !type:Single
        25
      AggroVisionRadius: !type:Single
        25
      NavClimb: !type:Bool
        true
      NavInteract: !type:Bool
        true
      NavPry: !type:Bool
        true
      NavSmash: !type:Bool
        true
  - type: MeleeWeapon
    soundHit:
        path: /Audio/Weapons/bladeslice.ogg
    angle: 0
    animation: WeaponArcPunch
    damage:
      types:
        Blunt: 15
        Structural: 30
  - type: RechargeBasicEntityAmmo
    rechargeCooldown: 2
    rechargeSound:
      path: /Audio/_NF/Effects/silence.ogg
  - type: BasicEntityAmmoProvider
    proto: DartAberrantFleshHorrorSpike
    capacity: 1
    count: 1
  - type: Gun
    showExamineText: false
    fireRate: 0.75
    minAngle: 10
    maxAngle: 20
    angleIncrease: 2
    angleDecay: 3
    selectedMode: SemiAuto
    availableModes:
      - SemiAuto
    soundGunshot:
      collection: BulletMiss
  - type: StaticPrice
    price: 3000
