#region пронзатель
- type: entity
  parent: [ BiohazardousMobBase, MobPassiveRegen ]
  id: BiohazardousStabber
  name: пронзатель
  description: Безвольный сгусток красной споры и мяса, оснащённый длинными органическими когтями вместо руки. Он с лёгкостью может превратить вас в решето, оказавшись поблизости.
  # categories: [ HideSpawnMenu ]
  components:
  - type: Sprite
    sprite: _Lua/Diseases/Mobs/BiohazardMobs.rsi
    layers:
    - map: [ "enum.DamageStateVisualLayers.Base" ]
      state: stabing
  - type: DamageStateVisuals
    states:
      Alive:
        Base: stabing
      Critical:
        Base: dead
      Dead:
        Base: dead
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 200
      behaviors:
      - !type:DoActsBehavior
        acts: ["Destruction"]
      - !type:PlaySoundBehavior
        sound:
          collection: gib
      - !type:SpawnEntitiesBehavior
        spawn:
          CrimsonSporeFlesh1:
            min: 2
            max: 7
  - type: HTN
    rootTask:
       task: BiohazardousHTNMeleeCompound
    blackboard:
      VisionRadius: !type:Single
        15
      AggroVisionRadius: !type:Single
        15
      NavClimb: !type:Bool
        true
      NavInteract: !type:Bool
        true
      NavPry: !type:Bool
        true
      NavSmash: !type:Bool
        true
  - type: MeleeWeapon
    soundHit:
        path: /Audio/Weapons/bladeslice.ogg
    angle: 0
    animation: WeaponArcClaw
    damage:
      types:
        Piercing: 15
        Structural: 30
  - type: StaticPrice
    price: 3000
