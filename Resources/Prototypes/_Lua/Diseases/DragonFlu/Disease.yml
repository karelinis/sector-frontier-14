#region акула
- type: entity
  name: карпоакула
  id: MobDiseaseDragonShark
  parent: [ SimpleNonHTNSpaceMobBase, FlyingMobBase, MobPassiveRegen ]
  description: Странного вида карпоакула. Кажется её взгляд выглядит осмысленным.
  suffix: "NoAI, DiseaseMorph"
  components:
  - type: NightVision # Goobstation - Nigthvision
    color: "#808080"
    activateSound: null
    deactivateSound: null
  - type: InputMover
  - type: MobMover
  - type: NpcFactionMember
    factions:
    - Dragon
  - type: Sprite
    sprite: Mobs/Aliens/Carps/sharkminnow.rsi
    layers:
    - map: [ "enum.DamageStateVisualLayers.Base" ]
      state: alive
    - map: [ "enum.DamageStateVisualLayers.BaseUnshaded" ]
      state: mouth
      shader: unshaded
  - type: CombatMode
  - type: Physics
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeCircle
          radius: 0.35 # Frontier 0.40<0.35 Lowered the value, to allow them to fit through the airlocks
        density: 100
        mask:
          - FlyingMobMask
        layer:
          - FlyingMobLayer
  - type: MobState
  - type: MobThresholds
    thresholds:
      0: Alive
      200: Dead # Might seem random, but this brings up the hits to kill with a crusher mark to 3
  - type: MovementSpeedModifier
    baseWalkSpeed: 2.5
    baseRunningSpeed: 3.5
  - type: Stamina
    critThreshold: 150
  - type: DamageStateVisuals
    states:
      Alive:
        Base: alive
        BaseUnshaded: mouth
      Dead:
        Base: dead
        BaseUnshaded: dead_mouth
  - type: Body
    prototype: Bloodsucker
    requiredLegs: 1
    thermalVisibility: true
  - type: MeleeWeapon
    damage:
      types:
       Slash: 7
       Bloodloss: 7
  - type: Damageable #Lua
    damageModifierSet: MobHostileDamageModifierSetCarpMeleeMajor
  - type: StaminaDamageOnCollide #Lua
    damage: 5
  - type: TypingIndicator
    proto: alien
  - type: Tag
    tags:
      - DoorBumpOpener
      - CannotSuicide
      - CanPilot
  - type: ReplacementAccent
    accent: genericAggressive
  - type: Speech
    speechVerb: LargeMob
  - type: InteractionPopup
    interactSuccessString: petting-success-carp
    interactFailureString: petting-failure-carp
    interactFailureSound:
      path: /Audio/Effects/bite.ogg
  - type: Carriable # DeltaV
  - type: RadarBlip
    radarColor: "#e26601"
    scale: 0.7
    shape: Circle
    visibleFromOtherGrids: true
    requireNoGrid: false
    maxDistance: 4096
  - type: InfectOnMelee
    disease: DragonFlu
    infectChance: 1
  - type: DiseaseCarrier
    naturalImmunities:
    - DragonFlu
  - type: GoblinAccent
  - type: LizardAccent
  - type: MothAccent
  - type: RoarAccent
  - type: TTS
    enabled: true
    voice: Elder
