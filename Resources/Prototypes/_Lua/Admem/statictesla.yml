#region база статичной теслы
- type: entity
  id: BaseEnergyBallStatic
  parent: BaseStructure
  abstract: true
  components:
  - type: Clickable
  - type: Physics
    bodyType: Static
  - type: AmbientSound
    volume: 3
    range: 15
    sound:
      path: /Audio/Effects/tesla.ogg
  - type: PointLight
    enabled: true
    radius: 8
    energy: 2
    color: "#4080FF"
  - type: Appearance

#region статичная тесла
- type: entity
  id: TeslaEnergyBallStatic
  parent: BaseEnergyBallStatic
  name: статичная аномалия Теслы
  description: Огромный шар энергии, явно желающий уничтожить всё сущее. Благодаря неведомой силе остаётся на месте.
  components:
  - type: Fixtures
    fixtures:
      EventHorizonCollider:
        shape:
          !type:PhysShapeCircle
            radius: 0.55
        hard: true
        restitution: 0.8
        density: 99999
        mask:
        - Opaque
        layer:
        - GlassLayer
      EventHorizonConsumer:
        shape:
          !type:PhysShapeCircle
            radius: 0.65
        hard: false
        mask:
        - Opaque
        layer:
        - GlassLayer
  - type: PointLight
    radius: 10
    energy: 16
  - type: LightningArcShooter
    arcDepth: 3
    maxLightningArc: 4
    shootMinInterval: 3
    shootMaxInterval: 5
    shootRange: 7
    lightningPrototype: Lightning
  - type: Sprite
    drawdepth: Effects
    sprite: Structures/Power/Generation/Tesla/energy_ball.rsi
    layers:
    - state: energy_ball
      shader: unshaded
  - type: EmitSoundOnSpawn
    sound:
      path: /Audio/Effects/tesla_collapse.ogg
      params:
        variation: 0.3
  - type: InteractionPopup # for the brave
    successChance: 0.2
    interactSuccessString: petting-success-tesla
    interactFailureString: petting-failure-tesla
    interactSuccessSpawn: EffectHearts
  - type: GuideHelp # For the curious among the brave.
    guides:
    - TeslaEngine
    - SingularityTeslaEngine
    - Power
  # Frontier: tethered danger balls & radar blips
  # - type: DangerTethered // Lua
  - type: RadarBlip
    scale: 4
    shape: Star
    visibleFromOtherGrids: true
  # End Frontier: tethered danger balls & radar blips