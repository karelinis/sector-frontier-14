#region Спавнер
- type: entity
  parent: [ BaseItem ]
  id: AiTeleportPsychoAdmin
  name: телепорт подкреплений ГРЕЙТАЙД
  suffix: "адмем"
  description: Унивенсальный телепорт для призыва ГРЕЙТАЙДЕРОВ на сервер. "проклятие стало клоунадой и посмешищем" - комментарий 25Hydra08
  components:
  - type: Sprite
    sprite: Objects/Devices/door_remote.rsi
    layers:
    - state: door_remotebase
    - state: door_remotelightscolour
      color: "#ff00dd"
    - state: door_remotescreencolour
      color: "#9c9c9c"
  - type: Item
    storedRotation: -90
  - type: RechargeBasicEntityAmmo
    rechargeCooldown: 1
    rechargeSound: /Audio/Machines/phasein.ogg
  - type: BasicEntityAmmoProvider
    proto: AIPsychoTeleportSpawner
    capacity: 100
    count: 100
  - type: Gun
    fireRate: 1
    useKey: false
    selectedMode: FullAuto
    availableModes:
      - FullAuto
    soundGunshot: /Audio/Machines/phasein.ogg
    soundEmpty: /Audio/_NF/Effects/silence.ogg

- type: entity
  name: AIPsychoTeleportSpawner
  id: AIPsychoTeleportSpawner
  parent: MarkerBase
  components:
  - type: EntityTableSpawner
    deleteSpawnerAfterSpawn: true
    offset: 1
    table: !type:AllSelector
      children:
      - !type:EntSelector
        id: AIPsychoBeacon
      - !type:EntSelector
        id: AIPsychoPoorSpawner
      - !type:EntSelector
        id: AIPsychoPoorSpawner
      - !type:EntSelector
        id: AIPsychoPoorSpawner
      - !type:EntSelector
        id: AIPsychoPoorSpawner
      - !type:EntSelector
        id: AIPsychoWelderSpawner
      - !type:EntSelector
        id: AIPsychoWelderSpawner
      - !type:EntSelector
        id: AIPsychoBreakerSpawner
      - !type:EntSelector
        id: AIPsychoBreakerSpawner
      - !type:EntSelector
        id: AIPsychoBreakerSpawner
      - !type:EntSelector
        id: AIPsychoStunSpawner
      - !type:EntSelector
        id: AIPsychoStunSpawner
      - !type:EntSelector
        id: AIPsychoStunSpawner

#region БАЗЫ

- type: entity
  parent: BaseMobHuman
  id: AIPsychoBase
  name: AI Псих
  abstract: true
  components:
  - type: RandomHumanoidAppearance
    randomizeName: true
  - type: AutoImplant
    implants:
    - MedicalTrackingImplant
  - type: IntrinsicRadioTransmitter
    channels:
    - Common
  - type: ActiveRadio
    channels:
    - Common
  - type: TTS
    enabled: true
  - type: HTN
    rootTask:
       task: AIPsychoCompound
    blackboard:
      NavClimb: !type:Bool
        true
      NavInteract: !type:Bool
        true
      NavPry: !type:Bool
        true
      NavSmash: !type:Bool
        true
  - type: NpcFactionMember
    factions:
    - SimpleHostile
  - type: NPCImprintingOnSpawnBehaviour
    whitelist:
      tags:
      - AIPsychoBeacon
    follow: true
    spawnFriendsSearchRadius: 5
  - type: Vocalizer
    minVocalizeInterval: 30
    maxVocalizeInterval: 120
  - type: DatasetVocalizer
    dataset: spacepunkhumanoidchatter
  - type: AutoWakeUp
  - type: TimedDespawn
    lifetime: 7200

- type: htnCompound
  id: AIPsychoCompound
  branches:
    - tasks:
        - !type:HTNCompoundTask
          task: RangedCombatCompound
    - tasks:
        - !type:HTNCompoundTask
          task: MeleeCombatCompound
    - tasks:
        - !type:HTNCompoundTask
          task: FollowCompound
    - tasks:
        - !type:HTNCompoundTask
          task: IdleCompound

#region Маяк
- type: entity
  parent: BaseItem
  id: AIPsychoBeacon
  name: маяк ГРЕЙТАЙДЕРОВ
  description: Маленький маяк, призванный помочь вам управлять отрядами ГРЕЙТАЙДЕРОВ.
  categories: [ HideSpawnMenu ]
  components:
  - type: Sprite
    sprite: Objects/Devices/station_beacon.rsi
    drawdepth: BelowFloor
    layers:
    - state: blink
      map: ["base"]
  - type: Appearance
  - type: GenericVisualizer
    visuals:
      enum.NavMapBeaconVisuals.Enabled:
        base:
          True: {state: blink}
          False: {state: icon}
  - type: Item
    size: Small
  - type: Visibility
    layer: 1
  - type: Anchorable
  - type: Tag
    tags:
    - AIPsychoBeacon
  - type: TimedDespawn
    lifetime: 7200

- type: Tag
  id: AIPsychoBeacon

