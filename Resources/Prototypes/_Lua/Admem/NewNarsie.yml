- type: entity
  id: SpawnNarsieGib
  parent: SpawnNarsieBase
  name: Кровавая Луна
  components:
  - type: GridSpawner
    path: /Maps/_NF/Bluespace/bloodmoon.yml
  - type: AnnounceOnSpawn
    message: narsie-has-defeated
    sender: narsie-has-risen-sender
    sound:
      path: /Audio/Misc/narsie_rises.ogg
    color: green

- type: entity
  id: SpawnNarsieBase
  parent: MarkerBase
  abstract: true
  components:
  - type: GridSpawner
    addComponents:
    - type: Company
      companyName: BrokenAi
    - type: RadarBlipIcon
      icon: /Textures/_Lua/Interface/Radar/ai.png
      scale: 1.2
      allowWhenHidden: true
    - type: IFF
      color: "#9a2020"
    - type: GridCleanupGrid
      cleanupAcceleration: 3
      ignorePowered: true
      ignoreIFF: true
      ignorePrice: true