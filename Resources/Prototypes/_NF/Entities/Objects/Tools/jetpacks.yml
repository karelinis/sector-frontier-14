#Empty security
- type: entity
  id: JetpackNfsd
  parent: JetpackSecurity
  name: NFSD jetpack
  suffix: Empty
  components:
  - type: Item
    sprite: _NF/Objects/Tanks/Jetpacks/nfsd.rsi
  - type: Sprite
    sprite: _NF/Objects/Tanks/Jetpacks/nfsd.rsi
  - type: Clothing
    sprite: _NF/Objects/Tanks/Jetpacks/nfsd.rsi
  - type: Jetpack
    acceleration: 1.3
    moleUsage: 0.001
  - type: Tag
    tags:
      - EmagImmune

#Filled security
- type: entity
  id: JetpackNfsdFilled
  parent: JetpackSecurityFilled
  name: NFSD jetpack
  suffix: Filled
  components:
  - type: Item
    sprite: _NF/Objects/Tanks/Jetpacks/nfsd.rsi
  - type: Sprite
    sprite: _NF/Objects/Tanks/Jetpacks/nfsd.rsi
  - type: Clothing
    sprite: _NF/Objects/Tanks/Jetpacks/nfsd.rsi
  - type: Tag
    tags:
      - EmagImmune

#Empty pirate
- type: entity
  id: JetpackPirate
  parent: [BaseJetpack, BaseC1PirateContraband] # Lua-changes: BaseC3PirateContraband > BaseC1PirateContraband
  name: pirate jetpack
  suffix: Empty
  components:
  - type: Item
    sprite: _NF/Objects/Tanks/Jetpacks/pirate.rsi
  - type: Sprite
    sprite: _NF/Objects/Tanks/Jetpacks/pirate.rsi
  - type: Clothing
    sprite: _NF/Objects/Tanks/Jetpacks/pirate.rsi
  - type: Tag
    tags:
      - DemagImmune
  - type: Jetpack
    radarBlip: false

