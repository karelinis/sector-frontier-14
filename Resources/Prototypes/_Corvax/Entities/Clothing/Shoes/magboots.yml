- type: entity
  parent: [ClothingShoesBootsMagBase, BaseJetpack, BaseC1Contraband]
  id: ClothingShoesBootsJetBoots
  name: jump boots
  description: One moment and you are already here.
  components:
  - type: Sprite
    sprite: Corvax/Clothing/Shoes/Boots/jetboots.rsi
    state: icon
  - type: Clothing
    sprite: Corvax/Clothing/Shoes/Boots/jetboots.rsi
  - type: Magboots
  - type: ClothingSpeedModifier
    walkModifier: 1
    sprintModifier: 1
  - type: NoSlip
  - type: GasTank
    outputPressure: 42.6
    air:
      # 2 minutes of thrust
      volume: 0.75
      temperature: 293.15
      moles:
      - 0.153853429 # oxygen
      - 0.153853429 # nitrogen
  - type: Item
    sprite: Corvax/Clothing/Shoes/Boots/jetboots.rsi
    size: Normal
    shape: # Lua
      - 0,0,3,2 # Lua
  - type: StaticPrice
    price: 1500

- type: entity
  id: ActionToggleJetBoots
  parent: ActionToggleMagboots
  categories: [ HideSpawnMenu ]
  components:
  - type: Action
    icon: { sprite: Corvax/Clothing/Shoes/Boots/jetboots.rsi, state: icon }
    iconOn:
      sprite: Corvax/Clothing/Shoes/Boots/jetboots.rsi
      state: icon-on
